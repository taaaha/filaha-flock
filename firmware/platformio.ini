; ════════════════════════════════════════════════════════════════
;  Filaha Flock — firmware for the LilyGO T-A7670G R2
;  ESP32-WROVER + SIMCom A7670G (LTE-Cat-1 + 2G fallback, SMS)
;  Gravity I²C sensors via the I²C HUB
; ════════════════════════════════════════════════════════════════
[env:lilygo-t-a7670g]
platform        = espressif32 @ 6.5.0
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
upload_speed    = 921600

; Bigger app partition so TinyGSM + future OTA fit comfortably.
board_build.partitions = huge_app.csv

build_flags =
  ; A7670G uses the SIMCom A76xx AT set — TinyGSM's SIM7600 driver is the right one.
  -D TINY_GSM_MODEM_SIM7600
  -D TINY_GSM_RX_BUFFER=2048
  -D BOARD_LILYGO_T_A7670G_R2
  -D FILAHA_FIRMWARE_VERSION=\"0.1.0\"

lib_deps =
  vshymanskyy/TinyGSM @ ^0.12.0
  vshymanskyy/StreamDebugger @ ^1.0.1
  ; Sensirion STCC4 (3-in-1 CO₂ + temp + humidity) — DFRobot Gravity wrapper.
  ; If the library doesn't resolve cleanly from PIO registry, swap to:
  ;   https://github.com/DFRobot/DFRobot_STCC4.git
  https://github.com/DFRobot/DFRobot_STCC4.git
  ; MiCS-4514 NH₃ — pulled now so the firmware compiles once FILAHA_HAS_NH3=1.
  https://github.com/DFRobot/DFRobot_MICS.git
